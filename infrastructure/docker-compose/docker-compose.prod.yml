version: "3.9"

# Production Docker Compose — all Security Platform services
# Deploy: docker compose -f docker-compose.prod.yml up -d

x-common-env: &common-env
  REDIS_URL: redis://redis:6379/0
  DATABASE_URL: postgresql+asyncpg://security:${DB_PASSWORD}@postgres:5432/security_platform
  PYTHONUNBUFFERED: "1"

services:
  # ── Core Services ──────────────────────────────────────────────────────────

  api:
    build:
      context: ../../
      dockerfile: trust-gateway/api/Dockerfile.full
    container_name: security-api
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
      JWT_SECRET: ${JWT_SECRET}
      GITLAB_WEBHOOK_SECRET: ${GITLAB_WEBHOOK_SECRET}
    volumes:
      - api_data:/app/data
      - reports:/app/reports
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/stats"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build:
      context: ../../
      dockerfile: trust-gateway/api/Dockerfile.full
    container_name: security-worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=4
    environment:
      <<: *common-env
      DOCKER_HOST: unix:///var/run/docker.sock
    volumes:
      - reports:/app/reports
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"

  beat:
    build:
      context: ../../
      dockerfile: trust-gateway/api/Dockerfile.full
    container_name: security-beat
    command: celery -A workers.celery_app beat --loglevel=info
    environment:
      <<: *common-env
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"

  # ── Data Stores ────────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: security-postgres
    environment:
      POSTGRES_DB: security_platform
      POSTGRES_USER: security
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U security"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: security-redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 300M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Monitoring ─────────────────────────────────────────────────────────────

  flower:
    image: mher/flower:2.0
    container_name: security-flower
    command: celery --broker=redis://redis:6379/0 flower --port=5555
    ports:
      - "127.0.0.1:5555:5555"
    depends_on:
      - redis
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  # ── Reverse Proxy ──────────────────────────────────────────────────────────

  nginx:
    image: nginx:alpine
    container_name: security-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - static_files:/var/www/static:ro
    depends_on:
      - api
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  postgres_data:
  redis_data:
  api_data:
  reports:
  static_files:

networks:
  default:
    name: security-platform
