rules:
  - id: company-hardcoded-password
    patterns:
      - pattern: $VAR = "..."
      - metavariable-regex:
          metavariable: $VAR
          regex: (?i)(password|passwd|secret|api_key|apikey|token|auth)
      - pattern-not: $VAR = ""
      - pattern-not: $VAR = "changeme"
      - pattern-not: $VAR = "placeholder"
    message: >
      Hardcoded secret detected in variable '$VAR'.
      Use environment variables or a secret manager.
    severity: WARNING
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-798"
      confidence: MEDIUM

  - id: company-hardcoded-connection-string
    patterns:
      - pattern: |
          $VAR = "...$PROTO://$USER:$PASS@..."
      - metavariable-regex:
          metavariable: $PROTO
          regex: (postgres|mysql|mongodb|redis|amqp)
    message: >
      Hardcoded database connection string with credentials.
      Use environment variables for connection strings.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-798"
      confidence: HIGH

  - id: company-private-key-inline
    pattern: |
      $VAR = "-----BEGIN ...PRIVATE KEY-----..."
    message: >
      Private key embedded in source code. Store keys in secure vault.
    severity: ERROR
    languages: [python]
    metadata:
      category: security
      cwe: "CWE-321"
      confidence: HIGH
