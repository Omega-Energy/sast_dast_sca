# Gitleaks custom rules for corporate secret patterns
# Extend the default ruleset with organization-specific patterns

title = "Omega-Energy Custom Secret Rules"

# Internal service tokens
[[rules]]
id = "omega-internal-token"
description = "Omega-Energy internal service token"
regex = '''OMEGA_TOKEN_[A-Za-z0-9]{32,64}'''
tags = ["internal", "token", "omega"]
severity = "high"

[[rules]]
id = "omega-api-key"
description = "Omega-Energy API key"
regex = '''omega_api_[a-z0-9]{24,48}'''
tags = ["internal", "api-key", "omega"]
severity = "high"

# Database connection strings
[[rules]]
id = "postgres-connection-string"
description = "PostgreSQL connection string with credentials"
regex = '''postgres(ql)?://[^:]+:[^@]+@[^/]+/\w+'''
tags = ["database", "credentials"]
severity = "high"

[[rules]]
id = "mongodb-connection-string"
description = "MongoDB connection string with credentials"
regex = '''mongodb(\+srv)?://[^:]+:[^@]+@[^/]+'''
tags = ["database", "credentials"]
severity = "high"

[[rules]]
id = "redis-connection-string"
description = "Redis connection string with password"
regex = '''redis://:[^@]+@[^/]+'''
tags = ["database", "credentials"]
severity = "medium"

# Cloud provider keys
[[rules]]
id = "yandex-cloud-token"
description = "Yandex Cloud OAuth/IAM token"
regex = '''(t1\.[A-Za-z0-9_-]{86}|AQVN[A-Za-z0-9_-]{35,})'''
tags = ["cloud", "yandex"]
severity = "high"

[[rules]]
id = "yandex-cloud-api-key"
description = "Yandex Cloud API key"
regex = '''AQVNw[A-Za-z0-9_-]{38}'''
tags = ["cloud", "yandex", "api-key"]
severity = "high"

# CI/CD tokens
[[rules]]
id = "gitlab-personal-token"
description = "GitLab Personal Access Token"
regex = '''glpat-[A-Za-z0-9_-]{20}'''
tags = ["gitlab", "token"]
severity = "high"

[[rules]]
id = "gitlab-pipeline-token"
description = "GitLab CI Pipeline Token"
regex = '''glcbt-[A-Za-z0-9]{1,5}_[A-Za-z0-9_-]{20}'''
tags = ["gitlab", "ci", "token"]
severity = "high"

# JWT and session tokens
[[rules]]
id = "jwt-token"
description = "JSON Web Token"
regex = '''eyJ[A-Za-z0-9_-]{10,}\.eyJ[A-Za-z0-9_-]{10,}\.[A-Za-z0-9_-]{10,}'''
tags = ["jwt", "token"]
severity = "medium"

# Private keys
[[rules]]
id = "rsa-private-key"
description = "RSA Private Key"
regex = '''-----BEGIN RSA PRIVATE KEY-----'''
tags = ["key", "private"]
severity = "critical"

[[rules]]
id = "ec-private-key"
description = "EC Private Key"
regex = '''-----BEGIN EC PRIVATE KEY-----'''
tags = ["key", "private"]
severity = "critical"

# Internal endpoints
[[rules]]
id = "internal-ip-hardcoded"
description = "Hardcoded internal IP address"
regex = '''(10\.\d{1,3}\.\d{1,3}\.\d{1,3}|172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}|192\.168\.\d{1,3}\.\d{1,3}):\d{2,5}'''
tags = ["internal", "network"]
severity = "low"

# Allowlist paths to reduce noise
[allowlist]
paths = [
    '''(.*?)test(.*?)''',
    '''(.*?)mock(.*?)''',
    '''(.*?)example(.*?)''',
    '''\.env\.example''',
    '''README\.md''',
]
