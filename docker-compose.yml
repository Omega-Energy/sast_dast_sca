version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.full
    container_name: sast_api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./reports:/app/reports
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
