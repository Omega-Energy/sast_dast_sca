version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: trust-gateway/api/Dockerfile.full
    container_name: sast_api
    ports:
      - "8000:8000"
    volumes:
      - ./trust-gateway/api/data:/app/data
      - ./reports:/app/reports
      - /var/run/docker.sock:/var/run/docker.sock
      - /c:/mnt/c
    environment:
      - PYTHONUNBUFFERED=1
      - DOCKER_HOST=unix:///var/run/docker.sock
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sast_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: trust-gateway/api/Dockerfile.full
    container_name: sast_worker
    command: celery -A workers.celery_app worker --loglevel=info --concurrency=2
    volumes:
      - ./trust-gateway/api/data:/app/data
      - ./reports:/app/reports
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - DOCKER_HOST=unix:///var/run/docker.sock
      - CLAMAV_HOST=clamav
      - CLAMAV_PORT=3310
      - ZAP_API_URL=http://zap:8090
    depends_on:
      - redis
      - clamav
      - zap
    restart: unless-stopped

  clamav:
    image: clamav/clamav:latest
    container_name: sast_clamav
    ports:
      - "3310:3310"
    volumes:
      - clamav_data:/var/lib/clamav
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "clamdcheck"]
      interval: 60s
      timeout: 10s
      retries: 3

  zap:
    image: ghcr.io/zaproxy/zaproxy:stable
    container_name: sast_zap
    command: zap.sh -daemon -host 0.0.0.0 -port 8090 -config api.addrs.addr.name=.* -config api.addrs.addr.regex=true -config api.disablekey=true
    ports:
      - "8090:8090"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/JSON/core/view/version/"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  redis_data:
  clamav_data:
