version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: trust-gateway/api/Dockerfile.full
    container_name: sast_api
    ports:
      - "8000:8000"
    volumes:
      - ./trust-gateway/api/data:/app/data
      - ./reports:/app/reports
      - /var/run/docker.sock:/var/run/docker.sock
      - /c:/mnt/c
    environment:
      - PYTHONUNBUFFERED=1
      - DOCKER_HOST=unix:///var/run/docker.sock
    restart: unless-stopped
